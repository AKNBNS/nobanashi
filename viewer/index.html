<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    <!-- CSSだけは今のところ外部ですが、もし真っ暗ならここも後で修正します -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/laymic@latest/dist/laymic.min.css">
    <style>
        body { background-color: #1a1a1a; margin: 0; padding: 0; color: white; }
        #laymic { opacity: 0; transition: opacity 0.5s; }
        #laymic img { width: 100%; }
        #status-box { position: fixed; top: 10px; left: 10px; background: rgba(255,0,0,0.8); padding: 10px; z-index: 10000; font-size: 12px; }
    </style>
</head>
<body>

    <div id="status-box">デバッグ中：プログラム直接実行</div>

    <div id="laymic">
      <img src="assets/004.jpg" onerror="this.src='https://via.placeholder.com/300x400?text=Image+Not+Found'">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <!-- 
       外部JSファイル（laymic.iife.min.js）を読み込む代わりに、
       ブラウザが直接実行できる形式でライブラリを呼び出します。
    -->
    <script type="module">
      // 外部ファイルを使わず、JavaScriptの「import」という機能でネットから直接「部品」として呼び出します。
      // これなら「script src="..."」という従来の読み込みがブロックされる環境でも動く可能性が高いです。
      import Laymic from 'https://cdn.jsdelivr.net/npm/laymic@latest/dist/laymic.esm.js';

      window.addEventListener('load', () => {
        try {
          new Laymic('#laymic', {
            direction: 'rtl'
          });
          document.getElementById('laymic').style.opacity = 1;
          document.getElementById('status-box').style.backgroundColor = "green";
          document.getElementById('status-box').innerHTML = "✅ 起動に成功しました！";
        } catch (e) {
          document.getElementById('status-box').innerHTML = "❌ 起動エラー: " + e.message;
        }
      });
    </script>
</body>
</html>
