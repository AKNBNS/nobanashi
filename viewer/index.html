<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    <!-- CSSのパスを確認 -->
    <link rel="stylesheet" href="/AKKSR21/viewer/laymic/dist/laymic.min.css">
    <style>
        /* 読み込み前に画像がバラバラに表示されるのを防ぐ */
        #laymic { opacity: 0; }
        #laymic img { width: 100%; }
    </style>
</head>
<body>

    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <!-- JSのパスを「laymic.iife.min.js」に正確に合わせる -->
    <script src="/AKKSR21/viewer/laymic/dist/laymic.iife.min.js"></script>
    
    <script>
      // 画面の準備が完全に整ってから実行する
      window.addEventListener('load', function() {
        try {
          new Laymic('#laymic', {
            direction: 'rtl'
          });
          // 成功したら表示する
          document.getElementById('laymic').style.opacity = 1;
        } catch (e) {
          console.error("Laymicの起動に失敗しました:", e);
        }
      });
    </script>
</body>
</html>
