<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    <!-- CSSは確実に存在するURLを指定 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/laymic@1.2.2/dist/laymic.min.css">
    <style>
        body { background-color: #1a1a1a; margin: 0; padding: 0; color: white; }
        #laymic { opacity: 0; transition: opacity 0.5s; }
        #laymic img { width: 100%; }
        #status-box { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 10px; z-index: 10000; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="status-box">状態: 準備中...</div>

    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <script>
      // 1. プログラム（JSファイル）を動的に作成して読み込む
      const script = document.createElement('script');
      // バージョンを固定した、確実に存在するURLです
      script.src = "https://cdn.jsdelivr.net/npm/laymic@1.2.2/dist/laymic.iife.min.js";
      
      script.onload = () => {
        document.getElementById('status-box').innerHTML = "状態: ライブラリ読み込み成功！起動します...";
        try {
          // 2. 読み込みが終わったら起動
          new Laymic('#laymic', {
            direction: 'rtl'
          });
          document.getElementById('laymic').style.opacity = 1;
          document.getElementById('status-box').style.display = "none";
        } catch (e) {
          document.getElementById('status-box').innerHTML = "起動エラー: " + e.message;
        }
      };

      script.onerror = () => {
        document.getElementById('status-box').innerHTML = "状態: JSファイルの取得に失敗しました。";
      };

      document.body.appendChild(script);
    </script>
</body>
</html>
