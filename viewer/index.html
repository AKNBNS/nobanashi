<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    
    <!-- CSSの読み込み：distフォルダの中のファイルを指定します -->
    <link rel="stylesheet" href="laymic/dist/laymic.min.css">
</head>
<body>

    <!-- 漫画の表示エリア：assetsフォルダの中の画像を指定します -->
    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
      <!-- 必要な分だけ img タグを並べます -->
    </div>

    <!-- JSの読み込み：distフォルダの中のファイルを指定します -->
    <script src="laymic/dist/laymic.iife.min.js"></script>
    
    <script>
      // Laymicの実行
      new Laymic('#laymic', {
        // オプションが必要な場合はここに書きます（例：見開き設定など）
        // direction: 'rtl' // 右から左（縦書き漫画用）
      });
    </script>
</body>
</html>
