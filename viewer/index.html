<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画ビューアー</title>
    
    <!-- 1. CSSをネット上の公式配信元から読み込む -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/laymic@latest/dist/laymic.min.css">
    
    <style>
        #laymic { opacity: 0; transition: opacity 0.5s; }
        #laymic img { width: 100%; }
        body { background-color: #1a1a1a; margin: 0; padding: 0; }
    </style>
</head>
<body>

    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <!-- 2. JSをネット上の公式配信元から読み込む（これで絶対読み込めます） -->
    <script src="https://cdn.jsdelivr.net/npm/laymic@latest/dist/laymic.iife.min.js"></script>
    
    <script>
      // 読み込みを確認して実行
      window.addEventListener('load', function() {
        if (typeof Laymic !== 'undefined') {
          new Laymic('#laymic', {
            direction: 'rtl'
          });
          document.getElementById('laymic').style.opacity = 1;
          console.log("ついに成功しました！");
        } else {
          alert("ネットからの読み込みにも失敗しました。ネット接続を確認してください。");
        }
      });
    </script>
</body>
</html>
