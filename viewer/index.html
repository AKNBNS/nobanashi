<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>漫画ビューアー</title>
    <style>
        /* --- Laymic 構造定義 --- */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        .laymic {
            width: 100%;
            height: 100%;
            visibility: hidden; /* 準備ができるまで隠す */
            opacity: 0;
            transition: opacity 0.3s;
        }
        .laymic--ready {
            visibility: visible;
            opacity: 1;
        }
        .laymic__item {
            position: absolute;
            max-width: none;
            user-select: none;
            -webkit-user-drag: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        /* 右開き(rtl)用の並び */
        .laymic--rtl .laymic__item {
            direction: rtl;
        }
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="loading">画像を読み込み中...</div>

    <div id="laymic">
      <img src="assets/004.jpg">
      <img src="assets/005.jpg">
      <img src="assets/006.jpg">
      <img src="assets/007.jpg">
      <img src="assets/008.jpg">
      <img src="assets/009.jpg">
      <img src="assets/010.jpg">
      <img src="assets/011.jpg">
    </div>

    <script>
      /* --- Laymic ライブラリ本体 (iife版) --- */
      !function(t,e){"object"==typeof exports&&"undefined"!=typeof module?module.exports=e():"function"==typeof define&&define.amd?define(e):(t="undefined"!=typeof globalThis?globalThis:t||self).Laymic=e()}(this,(function(){"use strict";function t(t,e){if(!(t instanceof e))throw new TypeError("Cannot call a class as a function")}function e(t,e){for(var i=0;i<e.length;i++){var n=e[i];n.enumerable=n.enumerable||!1,n.configurable=!0,"value"in n&&(n.writable=!0),Object.defineProperty(t,n.key,n)}}var i={gap:0,direction:"ltr",pages:[],onInit:function(){},onResize:function(){},onUpdate:function(){}};return function(){function n(e,r){var o=this;t(this,n),this.el="string"==typeof e?document.querySelector(e):e,this.options=Object.assign({},i,r),this.items=Array.from(this.el.querySelectorAll("img")),this.pages=[],this.isLtr="ltr"===this.options.direction,this.el.classList.add("laymic"),this.el.classList.add("laymic--".concat(this.options.direction)),this.items.forEach((function(t){t.classList.add("laymic__item")})),window.addEventListener("resize",(function(){o.update(),o.options.onResize(o)})),this.init()}var r,o,s;return r=n,(o=[{key:"init",value:function(){this.update(),this.options.onInit(this)}},{key:"update",value:function(){var t=this;this.pages=[],this.el.style.display="block";var e=this.el.clientWidth,i=0;this.items.forEach((function(n,r){var o=n.naturalWidth,s=n.naturalHeight;if(0===o||0===s)return;var a=s*(e/o);n.style.width=e+"px",n.style.height="auto",t.pages.push({index:r,width:e,height:a,top:i}),i+=a+t.options.gap})),this.el.style.height=i+"px",this.options.onUpdate(this)}}])&&e(r.prototype,o),s&&e(r,s),n}()}));

      /* --- 起動処理 --- */
      function initViewer() {
        const images = document.querySelectorAll('#laymic img');
        let loadedCount = 0;

        // 全ての画像が読み込まれてから初期化（重要）
        images.forEach(img => {
          if (img.complete) {
            loadedCount++;
          } else {
            img.onload = () => {
              loadedCount++;
              if (loadedCount === images.length) start();
            };
            img.onerror = () => {
              loadedCount++;
              console.error("画像読み込み失敗:", img.src);
              if (loadedCount === images.length) start();
            };
          }
        });

        if (loadedCount === images.length) start();

        function start() {
          try {
            const viewer = new Laymic('#laymic', {
              direction: 'rtl', // 右開き
              gap: 0
            });
            
            const el = document.getElementById('laymic');
            el.classList.add('laymic--ready');
            document.getElementById('loading').style.display = 'none';
            
            // 最初のページへ強制スクロール（最後が出るのを防ぐ）
            window.scrollTo(0, 0);
            
            console.log("ビューアーが完全に準備できました");
          } catch (e) {
            console.error("起動失敗:", e);
          }
        }
      }

      window.addEventListener('load', initViewer);
    </script>
</body>
</html>
